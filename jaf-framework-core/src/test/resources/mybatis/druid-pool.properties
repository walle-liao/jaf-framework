driverClassName=com.mysql.jdbc.Driver
url=jdbc:mysql://127.0.0.1:3306/quote?user=root&password=123456&useUnicode=true&characterEncoding=UTF-8
# 初始化连接数量
druid.initialSize=10
# 最大并发连接数
druid.maxActive=500
# 最大空闲连接数
druid.maxIdle=30
# 最小空闲连接数
druid.minIdle=10
druid.maxWait=60000
# 超过时间限制是否回收
druid.removeAbandoned=true
# 超过时间限制多长
druid.removeAbandonedTimeout=120
# 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
druid.timeBetweenEvictionRunsMillis=60000
# 配置一个连接在池中最小生存的时间，单位是毫秒
druid.minEvictableIdleTimeMillis=300000
# 用来检测连接是否有效的sql，要求是一个查询语句
druid.validationQuery=SELECT 'x'
# 申请连接的时候检测
druid.testWhileIdle=true
# 申请连接时执行validationQuery检测连接是否有效，配置为true会降低性能
druid.testOnBorrow=false
# 归还连接时执行validationQuery检测连接是否有效，配置为true会降低性能
druid.testOnReturn=false
# 打开PSCache，并且指定每个连接上PSCache的大小
druid.poolPreparedStatements=true
# 
druid.maxPoolPreparedStatementPerConnectionSize=50
druid.filters=config,stat,log4j